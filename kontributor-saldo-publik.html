<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>Burung Hadiah Interaktif</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
    <style>
      
body {
    background-image: url('https://nasukafoods.site/langit.jpg');
    background-size: cover; 
    background-attachment: fixed;
    background-position: center;
    color: white; 
}
      
.header-info {
    position: fixed;
    left: 1%;
    top: 20px;
    z-index: 1000;
}

.sum {
    font-size: 50px;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

#public-pool-box {
    background: rgba(4, 58, 112, 0.8); 
    padding: 15px;
    border-radius: 10px;
    border: 3px solid yellow;
    cursor: pointer;
    text-shadow: 1px 1px 2px black;
    transition: 0.3s;
    width: 300px; 
}

#public-pool-box:hover {
    background: rgba(6, 85, 163, 0.9);
}

#public-pool-box h3 {
    margin-top: 0;
    font-size: 1.5em;
    text-align: center;
}

#public-pool-details {
    margin-top: 10px;
    font-size: 1.1em;
}

.input-circle ~ .pajaro {
    opacity: 1; 
    transition: 0.3s cubic-bezier(0,.43,1,0);
    animation: move 8s infinite alternate;
}

.input-circle:checked ~ .pajaro {
    opacity: 0;
}

.pajaro > span {
    display: none !important; 
}


#customAlert {
    display: none; 
    position: fixed; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    background: white; 
    padding: 20px; 
    border-radius: 10px; 
    box-shadow: 0 0 20px rgba(0,0,0,0.4); 
    z-index: 1001; 
    text-align: center; 
    max-width: 80%;
    color: #333; 
}


.pajaro {
    background: gray;
    position: absolute;
    left: 0;
    cursor: crosshair;
    border-radius: 50% 50% 20% 20%;
    color: white;
    line-height: 20px;
    letter-spacing: 2px;
    font-size: 0.8em;
    text-align: center;
    margin-top: -10px;
    margin-left: 0px;
    width: 30px;
    height: 30px;
    animation: planeo 0.8s linear infinite;
    z-index: 999;
}

.pajaro:before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    background: black;
    border-radius: 100% 0% 20% 0%;
    margin-top: 12px;
    margin-left: -5px;
    transform: rotateZ(45deg);
    width: 12px;
    height: 12px;
}

.pajaro:after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    box-shadow: inset 0px 11px 0 black;
    border-radius: 100% 100% 0 0;
    width: 200px;
    height: 200px;
    margin-top: -5px;
    margin-left: -90px;
    transform-origin: 100% 0%;
    animation: alas 3s linear infinite;
}

.pajaro1 { top: 50px; animation-delay: -2s !important; transform: scale(0.9); }
.pajaro2 { top: 100px; animation-delay: -1s !important; transform: scale(0.8); }
.pajaro3 { top: 200px; animation-delay: -3s !important; transform: scale(1.4); }
.pajaro4 { top: 50px; animation-delay: -12s !important; transform: scale(0.9); }
.pajaro5 { top: 100px; animation-delay: -16s !important; transform: scale(0.5); }
.pajaro6 { top: 200px; animation-delay: -20s !important; transform: scale(1.4); }
.pajaro7 { top: 150px; animation-delay: -4s !important; transform: scale(1.0); }
.pajaro8 { top: 250px; animation-delay: -5s !important; transform: scale(0.7); }
.pajaro9 { top: 300px; animation-delay: -6s !important; transform: scale(1.1); }
.pajaro10 { top: 150px; animation-delay: -7s !important; transform: scale(0.9); }
.pajaro11 { top: 250px; animation-delay: -8s !important; transform: scale(1.2); }
.pajaro12 { top: 300px; animation-delay: -9s !important; transform: scale(0.6); }
.pajaro13 { top: 70px; animation-delay: -10s !important; transform: scale(1.3); }
.pajaro14 { top: 120px; animation-delay: -11s !important; transform: scale(0.85); }
.pajaro15 { top: 180px; animation-delay: -12s !important; transform: scale(1.15); }
.pajaro16 { top: 220px; animation-delay: -13s !important; transform: scale(0.95); }
.pajaro17 { top: 280px; animation-delay: -14s !important; transform: scale(1.05); }
.pajaro18 { top: 320px; animation-delay: -15s !important; transform: scale(0.75); }
.pajaro19 { top: 90px; animation-delay: -16s !important; transform: scale(1.25); }
.pajaro20 { top: 140px; animation-delay: -17s !important; transform: scale(0.65); }


@keyframes move {
    10% { left: 10%; }
    20% { left: 20%; }
    30% { left: 30%; }
    40% { left: 40%; }
    50% { left: 50%; }
    60% { left: 60%; }
    70% { left: 70%; }
    80% { left: 80%; }
    90% { left: 90%; }
    100% { left: 0%; }
}

@keyframes planeo {
    0% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0); }
}

@keyframes alas {
    0% { transform: rotateX(0deg); }
    50% { transform: rotateX(40deg); }
    100% { transform: rotateX(0deg); }
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    margin: 5px;
    transition: 0.3s;
}

#selesaiBtn {
    background-color: #4CAF50;
    color: white;
}

#resetBirdsBtn {
    background-color: #f44336;
    color: white;
}

#customAlert button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    background-color: #007bff;
    color: white;
}
    </style>
</head>
<body>

<div class="header-info">
    <div id="public-pool-box" onclick="showCustomAlert('Saldo ini akan dibagikan kepada pemain yang beruntung mendapatkan hadiah dari burung. Anda berkontribusi sebagai Sultan/Donatur.', 'info')">
        <h3>Total Saldo Yang Disediakan</h3>
        <div class="sum" id="public-pool-total">...</div>
        <div id="public-pool-details">Total Saldo: </div>
    </div>
</div>
    
<div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; text-align: center;">
    <button id="selesaiBtn" class="btn">Selesai Berburu (Klaim Hadiah)</button>
    <button id="resetBirdsBtn" class="btn">Reset Burung</button>
    <input type="number" id="contributionAmount" placeholder="Jumlah Saldo Sumbangan (Rp)" style="padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; width: 250px;">
    <button id="contributeBtn" class="btn" style="background-color: #ff9800; color: white;">Sumbang Saldo</button>
</div>


<input type="checkbox" id="circle1" class="input-circle" style="display: none;">

<input type="checkbox" id="circle4" class="input-circle" style="display: none;">

<label for="circle5" class="pajaro pajaro5" data-bird-id="bird5"><span></span></label>
<input type="checkbox" id="circle6" class="input-circle" style="display: none;">
<label for="circle6" class="pajaro pajaro6" data-bird-id="bird6"><span></span></label>
<input type="checkbox" id="circle7" class="input-circle" style="display: none;">
<label for="circle7" class="pajaro pajaro7" data-bird-id="bird7"><span></span></label>
<input type="checkbox" id="circle8" class="input-circle" style="display: none;">
<label for="circle8" class="pajaro pajaro8" data-bird-id="bird8"><span></span></label>
<input type="checkbox" id="circle9" class="input-circle" style="display: none;">
<label for="circle9" class="pajaro pajaro9" data-bird-id="bird9"><span></span></label>
<input type="checkbox" id="circle10" class="input-circle" style="display: none;">
<label for="circle10" class="pajaro pajaro10" data-bird-id="bird10"><span></span></label>
<input type="checkbox" id="circle11" class="input-circle" style="display: none;">
<label for="circle11" class="pajaro pajaro11" data-bird-id="bird11"><span></span></label>
<input type="checkbox" id="circle12" class="input-circle" style="display: none;">
<label for="circle12" class="pajaro pajaro12" data-bird-id="bird12"><span></span></label>
<input type="checkbox" id="circle13" class="input-circle" style="display: none;">

<label for="circle15" class="pajaro pajaro15" data-bird-id="bird15"><span></span></label>

<label for="circle16" class="pajaro pajaro16" data-bird-id="bird16"><span></span></label>

<label for="circle17" class="pajaro pajaro17" data-bird-id="bird17"><span></span></label>
<input type="checkbox" id="circle18" class="input-circle" style="display: none;">
<label for="circle18" class="pajaro pajaro18" data-bird-id="bird18"><span></span></label>
<input type="checkbox" id="circle19" class="input-circle" style="display: none;">
<label for="circle19" class="pajaro pajaro19" data-bird-id="bird19"><span></span></label>
<input type="checkbox" id="circle20" class="input-circle" style="display: none;">
<label for="circle20" class="pajaro pajaro20" data-bird-id="bird20"><span></span></label>

<div id="customAlert">
    <h3 id="alertTitle"></h3>
    <p id="alertMessage"></p>
    <button id="alertOkBtn">OK</button>
</div>

<script>
    // Konfigurasi Firebase Anda (Asumsi sudah ada atau disiapkan secara eksternal)
    // const firebaseConfig = { ... }; 
    // firebase.initializeApp(firebaseConfig); 

    const db = firebase.database();
    const publicPoolRef = db.ref('public_pool');
    const birdsRef = db.ref('birds');
    const usersRef = db.ref('users');
    
    // ** REFERENSI FIREBASE BARU UNTUK SULTAN/SUMBANGAN **
    const sumbanganRef = db.ref('sumbangan'); // Riwayat setiap sumbangan
    const sultanTotalSumbanganRef = db.ref('sultan_total_sumbangan'); // Total sumbangan per user (untuk ranking Sultan)


    // Asumsi localUser sudah terdefinisi dari localStorage (seperti di index.html)
    let localUser = {
        ID: localStorage.getItem("ID"),
        Username: localStorage.getItem("Username"),
        Nama: localStorage.getItem("Nama") || 'Pengguna Anonim',
        Saldo: Number(localStorage.getItem("Saldo")) || 0,
    };

    const updateSaldoDisplay = () => {
        // Fungsi ini mungkin hanya untuk debug di sini
        console.log(`Saldo lokal: Rp ${localUser.Saldo.toLocaleString('id-ID')}`);
    };

    function formatRupiah(number) {
        return `Rp ${number.toLocaleString('id-ID')}`;
    }

    // Fungsi untuk menampilkan total saldo di public pool
    function updatePublicPoolTotal(total) {
        const formattedTotal = formatRupiah(total);
        document.getElementById('public-pool-total').textContent = formattedTotal;
        document.getElementById('public-pool-details').textContent = `Total Saldo: ${formattedTotal}`;
    }

    // Listener untuk public pool
    publicPoolRef.child('total').on('value', (snapshot) => {
        const total = snapshot.val() || 0;
        updatePublicPoolTotal(total);
    });
    
    // ===========================================
    // LOGIKA SULTAN: SUMBANG SALDO
    // ===========================================
    async function contributeToPublicPool() {
        if (!localUser.ID) {
            showCustomAlert("Harap login terlebih dahulu untuk menyumbang.", "warning");
            return;
        }

        const amountInput = document.getElementById('contributionAmount').value;
        const contribution = parseInt(amountInput);

        if (isNaN(contribution) || contribution <= 0) {
            showCustomAlert("Masukkan jumlah saldo sumbangan yang valid (minimal Rp 1).", "warning");
            return;
        }

        if (contribution > localUser.Saldo) {
            showCustomAlert("Saldo Pribadi tidak cukup untuk melakukan sumbangan.", "error");
            return;
        }

        const userRef = usersRef.child(localUser.ID);

        try {
            // 1. Kurangi saldo pengguna
            await userRef.child('Saldo').transaction((currentSaldo) => {
                const saldo = currentSaldo === null ? 0 : Number(currentSaldo);
                if (saldo < contribution) {
                    // Ini akan membatalkan transaksi di sisi Firebase jika saldo kurang
                    throw new Error("Saldo tidak cukup saat transaksi.");
                }
                return saldo - contribution;
            });
            
            // 2. Tambahkan saldo ke public_pool/total
            await publicPoolRef.child('total').transaction((currentTotal) => {
                return (currentTotal || 0) + contribution;
            });
            
            // 3. Catat Sumbangan ke node 'sumbangan' (Riwayat)
            const donationData = {
                userID: localUser.ID,
                username: localUser.Username,
                nama: localUser.Nama || localUser.Username, 
                amount: contribution,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };
            await sumbanganRef.push().set(donationData);

            // 4. Update total sumbangan pengguna untuk ranking Sultan
            const sultanTotalRef = sultanTotalSumbanganRef.child(localUser.ID);
            await sultanTotalRef.transaction((currentTotal) => {
                return (currentTotal || 0) + contribution;
            });


            localUser.Saldo -= contribution;
            localStorage.setItem("Saldo", localUser.Saldo);
            updateSaldoDisplay();
            document.getElementById('contributionAmount').value = '';
            showCustomAlert(`✅ Berhasil! Anda telah menyumbang ${formatRupiah(contribution)}. Terima kasih, Sultan!`, "success");

        } catch (error) {
            console.error("Gagal Transaksi Sumbangan:", error);
            showCustomAlert("❌ Gagal menyumbang: " + (error.message || "Terjadi kesalahan."), "error");
        }
    }
    
    document.getElementById('contributeBtn').addEventListener("click", contributeToPublicPool);


    // ===========================================
    // LOGIKA BURUNG DAN HADIAH (Klaim)
    // ===========================================
    function calculateTotalBirdsToClaim() {
        const claimedBirdsCount = document.querySelectorAll('.input-circle:checked').length;
        document.getElementById('selesaiBtn').textContent = `Selesai Berburu (Klaim ${claimedBirdsCount} Hadiah)`;
        return claimedBirdsCount;
    }
    
    // Ambil data burung yang sudah diklaim dari Firebase saat load
    birdsRef.on('value', (snapshot) => {
        const birdsData = snapshot.val() || {};
        document.querySelectorAll('.input-circle').forEach(input => {
            const birdId = input.id.replace('circle', 'bird');
            if (birdsData[birdId]) {
                input.checked = true;
            } else {
                input.checked = false;
            }
        });
        calculateTotalBirdsToClaim();
    });


    // Fungsi klaim hadiah
    async function claimPrize() {
        if (!localUser.ID) {
            showCustomAlert("Harap login terlebih dahulu.", "warning");
            return;
        }

        const claimedInputs = document.querySelectorAll('.input-circle:checked');
        if (claimedInputs.length === 0) {
            showCustomAlert("Anda belum berhasil menjatuhkan satu burung pun.", "info");
            return;
        }

        const claimedBirds = Array.from(claimedInputs).map(input => ({
            id: input.id,
            birdId: input.id.replace('circle', 'bird')
        }));
        
        const birdsToClaimCount = claimedBirds.length;

        try {
            // Ambil public pool saat ini
            const poolSnapshot = await publicPoolRef.child('total').once('value');
            let publicPoolTotal = poolSnapshot.val() || 0;

            if (publicPoolTotal < birdsToClaimCount) {
                // Jika saldo pool kurang, ambil sesuai jumlah pool yang ada
                birdsToClaimCount = publicPoolTotal; 
            }
            
            if (birdsToClaimCount === 0) {
                showCustomAlert("Saldo kolam hadiah (Public Pool) sedang kosong. Coba lagi nanti.", "warning");
                return;
            }

            // Hitung hadiah
            const saldoPerBurung = 10; // Nilai hadiah dasar per burung
            const saldoYangDiklaim = birdsToClaimCount * saldoPerBurung;

            // 1. Ambil nama donatur terakhir (untuk informasi)
            const sumbanganSnap = await sumbanganRef.limitToLast(1).once('value');
            let penambahSaldoNama = "Sistem";
            sumbanganSnap.forEach(child => {
                penambahSaldoNama = child.val().nama || "Sultan";
            });

            // 2. Kurangi saldo di public pool
            await publicPoolRef.child('total').transaction((currentTotal) => {
                const newTotal = (currentTotal || 0) - saldoYangDiklaim;
                return newTotal >= 0 ? newTotal : 0;
            });
            
            // 3. Tambahkan saldo ke pengguna
            const userRef = usersRef.child(localUser.ID);
            await userRef.child('Saldo').transaction((currentSaldo) => {
                const saldo = currentSaldo === null ? 0 : Number(currentSaldo);
                return saldo + saldoYangDiklaim;
            });
            
            // 4. Catat burung yang sudah diklaim
            const updates = {};
            claimedBirds.forEach(input => {
                updates[`${input.birdId}`] = {
                    claimedBy: localUser.ID,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                }; 
            });
            await birdsRef.update(updates);

            // Update Saldo lokal
            localUser.Saldo += saldoYangDiklaim;
            localStorage.setItem("Saldo", localUser.Saldo);

            // Reset tampilan burung yang diklaim di lokal (dilakukan oleh listener 'birdsRef.on')
            
            showCustomAlert(
                `Anda berhasil mendapat saldo **${formatRupiah(saldoYangDiklaim)}**<br>` +
                `Saldo ini berasal dari kiriman **${penambahSaldoNama}**!`,
                "jackpot"
            );
            
        } catch (error) {
            console.error("Gagal Transaksi Klaim Hadiah:", error);
            showCustomAlert("❌ Gagal mengklaim Saldo: " + (error.message || "Terjadi kesalahan."), "error");
        }
    }

    // ===========================================
    // FUNGSI UTILITY & EVENT LISTENER
    // ===========================================
    function showCustomAlert(message, type = "info") {
        const alertDiv = document.getElementById('customAlert');
        const alertTitle = document.getElementById('alertTitle');
        const alertMessage = document.getElementById('alertMessage');
        const overlay = document.createElement('div');

        let titleText = "Informasi";
        let bgColor = '#007bff';

        if (type === "success") {
            titleText = "Sukses!";
            bgColor = '#4CAF50';
        } else if (type === "error") {
            titleText = "Error!";
            bgColor = '#f44336';
        } else if (type === "warning") {
            titleText = "Peringatan!";
            bgColor = '#ff9800';
        } else if (type === "jackpot") {
            titleText = "JACKPOT SALDO!";
            bgColor = '#ffd700'; // Gold color for jackpot
        }

        alertTitle.textContent = titleText;
        alertTitle.style.color = bgColor;
        alertMessage.innerHTML = message;
        
        document.getElementById('alertOkBtn').style.backgroundColor = bgColor;
        alertDiv.style.display = 'block';

        overlay.style.position = 'fixed';
        overlay.style.top = '0';
        overlay.style.left = '0';
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.background = 'rgba(0,0,0,0.5)';
        overlay.style.zIndex = '1000';
        overlay.id = 'alertOverlay';
        document.body.appendChild(overlay);

        document.getElementById('alertOkBtn').onclick = function() {
            alertDiv.style.display = 'none';
            const overlayElement = document.getElementById('alertOverlay');
            if (overlayElement) overlayElement.remove();
        };
    }
    
    document.addEventListener("DOMContentLoaded", () => { 
        const inputs = document.querySelectorAll('.input-circle');
        const selesaiBtn = document.getElementById("selesaiBtn");
        const resetBirdsBtn = document.getElementById("resetBirdsBtn");
        
        inputs.forEach(input => {
            input.addEventListener('change', calculateTotalBirdsToClaim);
        });
        
        selesaiBtn.addEventListener("click", claimPrize);
        
        // Listener untuk update Saldo lokal dan Nama dari Firebase
        if (localUser.ID) { 
             const userRef = usersRef.child(localUser.ID);
             userRef.on('value', (snapshot) => {
                 const userData = snapshot.val();
                 if (userData !== null) {
                     localUser.Saldo = userData.Saldo ? Number(userData.Saldo) : 0;
                     localUser.Nama = userData.Nama || localUser.Nama; 
                     localUser.Username = userData.Username || localUser.Username;
                     localStorage.setItem("Saldo", localUser.Saldo);
                     localStorage.setItem("Nama", localUser.Nama);
                     localStorage.setItem("Username", localUser.Username);
                     updateSaldoDisplay();
                 }
             });
        }
        
        resetBirdsBtn.addEventListener("click", async () => {
            if (!localUser.ID) {
                showCustomAlert("Harap login.", "warning");
                return;
            }
            
            try {
                 await birdsRef.remove();
                 showCustomAlert("✅ Semua burung berhasil di-reset! Semua hadiah sudah diklaim atau dihilangkan.", "success");
            } catch(error) {
                 console.error("Gagal mereset burung:", error);
                 showCustomAlert("❌ Gagal mereset burung.", "error");
            }
        });


        updateSaldoDisplay();
        calculateTotalBirdsToClaim();
    });
</script>
