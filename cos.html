<!DOCTYPE html>
<html>
<head>
    <title>BAGIKAN Lokasi Saya (Data Pribadi User)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background-color: #f0f8ff; }
        h1 { color: #28a745; border-bottom: 2px solid #28a745; padding-bottom: 5px; }
        p { color: #555; }
        #map { 
            height: 350px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            margin-top: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .status { padding: 12px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; border: 1px solid; }
        .status.online { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .status.error { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .status.warning { background-color: #fff3cd; color: #856404; border-color: #ffeeba; }
    </style>
</head>
<body>
    <h1>Bagikan Lokasi Live Anda 📍</h1>
    <p>Data yang dikirimkan adalah ID, Nama, dan Nomor HP Anda yang tersimpan di browser.</p>
    
    <div id="status" class="status warning">Menunggu inisialisasi...</div>
    <div id="map"></div>
    
    <div id="userInfo" style="margin-top: 20px; font-size: 0.9em; color: #555;"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // --- 1. KONFIGURASI DAN VARIABEL ---
        const firebaseConfig = {
            apiKey: "AIzaSyAJPoqA190LutHQ7xnvnV96GTRHzz24IpI", 
            authDomain: "nasukafoods1.firebaseapp.com", 
            databaseURL: "https://nasukafoods1-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "nasukafoods1", 
            messagingSenderId: "84287800896", 
            appId: "1:84287800896:web:83189d6766997b00f701a5" 
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const database = firebase.database();
        const statusElement = document.getElementById('status');
        const userInfoElement = document.getElementById('userInfo');

        // PENTING: Mengambil ID, Nama, dan HP dari Local Storage
        // Ganti kunci ('userId', 'userName', 'userPhone') jika berbeda di sistem Anda
        const userId = localStorage.getItem('userId');
        const userName = localStorage.getItem('userName');
        const userPhone = localStorage.getItem('userPhone');

        // Jika salah satu data penting tidak ada, kita harus mencegah pengiriman atau menggunakan fallback.
        if (!userId) {
            statusElement.innerHTML = "❌ **ID User tidak ditemukan** di Local Storage. Pembagian lokasi dihentikan.";
            statusElement.classList.remove('online', 'warning');
            statusElement.classList.add('error');
            // Menghentikan eksekusi jika ID user tidak ada
            throw new Error("Local Storage key 'userId' not found."); 
        }

        // Path lokasi pelanggan menggunakan ID User sebagai kunci utama
        const locationRef = database.ref(`customer_locations/${userId}`); 
        
        let map;
        let currentMarker;
        const defaultLatLng = [-6.2088, 106.8456]; // Jakarta
        const UPDATE_INTERVAL_MS = 10000; 

        // --- 2. FUNGSI UTAMA ---

        function initMap() {
            // Tampilkan informasi pengguna
            userInfoElement.innerHTML = `**Data Pengguna yang Dibagikan:**<br>Nama: ${userName || 'Nama Tidak Ada'}<br>ID User: ${userId}<br>Nomor HP: ${userPhone || 'Nomor HP Tidak Ada'}`;

            map = L.map('map').setView(defaultLatLng, 10);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            currentMarker = L.marker(defaultLatLng, {
                icon: L.divIcon({
                    className: 'custom-div-icon',
                    html: '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="#00aaff"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>',
                    iconSize: [30, 30],
                    iconAnchor: [15, 30]
                })
            }).addTo(map)
                .bindPopup(`Lokasi ${userName || userId}`)
                .openPopup();

            if (navigator.geolocation) {
                statusElement.innerHTML = `✅ Geolocation aktif. Mulai pembagian lokasi untuk **${userName || 'User'}** (ID: **${userId}**) setiap ${UPDATE_INTERVAL_MS / 1000} detik.`;
                statusElement.classList.remove('warning', 'error');
                statusElement.classList.add('online');
                
                getLocationAndSend(); 
                
                setInterval(getLocationAndSend, UPDATE_INTERVAL_MS);
                
            } else {
                statusElement.innerHTML = "❌ Geolocation tidak didukung oleh browser Anda. Lokasi tidak dapat dibagikan secara *live*.";
                statusElement.classList.remove('online', 'warning');
                statusElement.classList.add('error');
            }
        }
        
        function getLocationAndSend() {
            navigator.geolocation.getCurrentPosition(sendLocation, locationError, {
                enableHighAccuracy: true,
                timeout: 5000 
            });
            const timeNow = new Date().toLocaleTimeString('id-ID');
            statusElement.innerHTML = `⏳ Mencari lokasi baru pada **${timeNow}**...`;
            statusElement.classList.remove('error');
            statusElement.classList.add('online');
        }

        function sendLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const latLng = [lat, lng];
            
            const timestampLocal = new Date().toLocaleTimeString('id-ID'); 
            const nextUpdateInSeconds = UPDATE_INTERVAL_MS / 1000;

            // --- PENTING: HANYA Mengirim ID, Nama, dan HP + Lokasi ---
            locationRef.set({ 
                lat: lat, 
                lng: lng,
                user_id: userId,          // ID User
                customer_name: userName,  // Nama User
                customer_phone: userPhone, // Nomor HP User
                time: timestampLocal, 
                accuracy: position.coords.accuracy,
                timestamp: firebase.database.ServerValue.TIMESTAMP 
            }).then(() => {
                const message = `✅ Lokasi **berhasil dibagikan** (User: ${userName || 'Tanpa Nama'}, ID: ${userId}). Terakhir: ${timestampLocal}. Akurasi: ±${position.coords.accuracy.toFixed(1)}m. Update berikutnya dalam ${nextUpdateInSeconds} detik.`;
                statusElement.innerHTML = message;
                statusElement.classList.remove('error');
                statusElement.classList.add('online');
            }).catch(error => {
                const message = `❌ Gagal mengirim ke Firebase: ${error.message}`;
                statusElement.innerHTML = message;
                statusElement.classList.remove('online');
                statusElement.classList.add('error');
            });

            currentMarker.setLatLng(latLng).bindPopup(`Lokasi ${userName || userId}. Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`);
            map.setView(latLng, 15);
        }

        function locationError(error) {
            let errorMessage = "Terjadi Kesalahan Geolocation: ";
            if (error.code === error.PERMISSION_DENIED) {
                errorMessage += "Izin lokasi ditolak oleh Anda (Pelanggan). Mohon izinkan akses lokasi di pengaturan browser Anda.";
            } else if (error.code === error.POSITION_UNAVAILABLE) {
                errorMessage += "Posisi lokasi tidak tersedia.";
            } else if (error.code === error.TIMEOUT) {
                errorMessage += "Waktu tunggu (timeout) untuk mendapatkan lokasi habis.";
            } else {
                errorMessage += error.message;
            }

            const message = `⚠️ ${errorMessage}. Mencoba lagi dalam ${UPDATE_INTERVAL_MS / 1000} detik.`;
            statusElement.innerHTML = message;
            statusElement.classList.remove('online');
            statusElement.classList.add('error');
            console.error("Geolocation Error:", error);
        }
        
        // Cek apakah ID User ditemukan sebelum menginisialisasi peta
        if (userId) {
            initMap();
        }
    </script>
</body>
</html>
