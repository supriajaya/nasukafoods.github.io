<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beli Voucher - Nasuka Foods</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://nasukafoods.site/index.css">
    <style>
        :root {
            /* Palette Biru Elegan */
            --primary: #0061ff;
            --primary-dark: #0046b8;
            --primary-light: #e6efff;
            --bg-body: #f4f7fa;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 20px rgba(0, 97, 255, 0.06);
            --text-main: #2c3e50;
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            color: var(--text-main);
        }

        /* Modern Header */
        .header-beli { 
            background: white; 
            padding: 18px 20px; 
            display: flex; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.04);
        }
        .header-beli i { 
            margin-right: 15px; 
            font-size: 20px; 
            color: var(--primary);
            cursor: pointer; 
        }
        .header-beli h3 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }

        /* Balance Card - Gradasi Biru Deep */
        .user-balance-info { 
            background: linear-gradient(135deg, #0061ff, #60efff); 
            padding: 24px; 
            margin: 15px; 
            border-radius: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: white;
            box-shadow: 0 10px 25px rgba(0, 97, 255, 0.2);
        }
        .user-balance-info span { font-size: 13px; opacity: 0.85; text-transform: uppercase; letter-spacing: 1px; }
        .user-balance-info strong { font-size: 22px; font-weight: 800; display: block; margin-top: 4px; }

        /* Voucher Section */
        .voucher-container { padding: 5px 15px 100px; }
        .category-title { 
            font-weight: 800; 
            margin: 30px 0 15px; 
            color: #1a2a3a; 
            font-size: 15px;
            display: flex;
            align-items: center;
        }
        .category-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--primary);
            margin-right: 12px;
            border-radius: 10px;
        }

        .voucher-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }

        /* Modern Card Design */
        .voucher-card { 
            background: white; 
            border-radius: 20px; 
            padding: 20px 16px; 
            text-align: center; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .voucher-card:active { transform: scale(0.95); }
        .voucher-card img { 
            width: 50px; 
            height: 50px; 
            object-fit: contain; 
            margin: 0 auto 15px;
            filter: grayscale(10%) contrast(110%);
        }
        .v-name { 
            font-size: 13px; 
            font-weight: 600; 
            color: #445;
            height: 38px;
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .v-price { 
            color: var(--primary); 
            font-weight: 800; 
            font-size: 15px; 
            margin: 10px 0 15px; 
            display: block; 
        }
        .btn-beli { 
            background: var(--primary-light); 
            color: var(--primary); 
            border: none; 
            padding: 11px; 
            border-radius: 12px; 
            font-size: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 700; 
            transition: 0.3s;
        }
        .btn-beli:hover { background: var(--primary); color: white; }

        /* Modern Invoice Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .invoice-box {
            background: white;
            width: 85%;
            max-width: 350px;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            position: relative;
        }

        .invoice-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .invoice-header h2 { font-size: 20px; font-weight: 800; margin: 0; color: #1e293b; }
        .invoice-header small { color: #94a3b8; font-size: 11px; margin-top: 5px; display: block; }

        .invoice-body { font-size: 14px; margin: 25px 0; }
        .invoice-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 14px; 
            color: #64748b;
        }
        
        .success-code {
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            padding: 18px;
            margin: 20px 0;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-weight: 800;
            font-size: 20px;
            color: var(--primary);
            text-align: center;
            border-radius: 16px;
            letter-spacing: 1px;
        }

        .btn-invoice {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 8px 15px rgba(0, 97, 255, 0.2);
        }

        .btn-cancel {
            background: none;
            color: #94a3b8;
            border: none;
            margin-top: 18px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        /* Loading Animation */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .loading { animation: pulse 1.8s infinite; }
    </style>
</head>
<body>

<div class="header-beli">
    <i class="fas fa-arrow-left" onclick="window.location.href='index.html'"></i>
    <h3>Voucher & Hiburan</h3>
</div>

<div class="user-balance-info">
    <div>
        <span>Saldo Anda</span>
        <strong id="displaySaldo" class="loading">Rp 0</strong>
    </div>
    <i class="fas fa-shield-alt fa-2x" style="opacity: 0.3;"></i>
</div>

<div class="voucher-container">
    <div id="voucher-list"></div>
</div>

<div id="invoiceModal" class="modal-overlay">
    <div class="invoice-box">
        <div class="invoice-header">
            <h2 id="invTitle">INVOICE</h2>
            <small id="invDate"></small>
        </div>
        <div class="invoice-body" id="invBody"></div>
        <div class="invoice-footer">
            <button class="btn-invoice" id="invActionBtn">KONFIRMASI</button>
            <button class="btn-cancel" id="invCancelBtn" onclick="closeModal()">Nanti Saja</button>
        </div>
    </div>
</div>

<script>
// Konfigurasi Firebase tetap sama
const firebaseConfig = {
    apiKey: "AIzaSyAJPoqA190LutHQ7xnvnV96GTRHzz24IpT",
    authDomain: "nasukafoods1.firebaseapp.com",
    databaseURL: "https://nasukafoods1-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "nasukafoods1",
    messagingSenderId: "84287800896",
    appId: "1:84287800896:web:83189d6766997b00f701a5"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();

const userID = localStorage.getItem("ID");
let userSaldo = 0;

if (userID) {
    db.ref(`users/${userID}`).on('value', (snapshot) => {
        const userData = snapshot.val();
        if (userData) {
            userSaldo = userData.Saldo || 0;
            const el = document.getElementById('displaySaldo');
            el.textContent = 'Rp ' + userSaldo.toLocaleString('id-ID');
            el.classList.remove('loading');
            localStorage.setItem("Saldo", userSaldo);
        }
    });
} else {
    document.getElementById('displaySaldo').textContent = 'Silahkan Login';
}

const products = [
    { cat: "Voucher Data", items: [
        { id: "ax1", name: "Axis 5GB", price: 11000, img: "https://nasukafoods.site/image/axis.jpg" },
        { id: "is1", name: "Indosat 3GB", price: 15000, img: "https://nasukafoods.site/image/indosat.jpg" },
        { id: "sf1", name: "XL 10GB", price: 15000, img: "https://nasukafoods.site/image/xl.jpg" },
        { id: "ts1", name: "Telkomsel 2GB", price: 28000, img: "https://nasukafoods.site/image/tsel.jpg" }
    ]},
    { cat: "Voucher Wifi Nits Cell", items: [
        { id: "wf1", name: "Nits Cell 12 Jam", price: 3000, img: "https://nasukafoods.site/image/nitscell.jpg" },
        { id: "nc1", name: "Nits Cell 6 Jam", price: 2000, img: "https://nasukafoods.site/image/nitscell.jpg" }
    ]},
    { cat: "Voucher Hiburan", items: [
        { id: "nf1", name: "Netflix 1 Day", price: 60000, img: "https://nasukafoods.site/image/netflix.png" },
        { id: "gp1", name: "Google Play 20K", price: 25000, img: "https://nasukafoods.site/image/gplay.png" }
    ]}
];

function renderProducts() {
    const container = document.getElementById('voucher-list');
    let html = '';
    products.forEach(group => {
        html += `<div class="category-title">${group.cat}</div><div class="voucher-grid">`;
        group.items.forEach(p => {
            html += `
                <div class="voucher-card">
                    <img src="${p.img}" alt="logo">
                    <div>
                        <span class="v-name">${p.name}</span>
                        <span class="v-price">Rp ${p.price.toLocaleString('id-ID')}</span>
                    </div>
                    <button class="btn-beli" onclick="prosesBeli('${p.id}', '${p.name}', ${p.price})">BELI</button>
                </div>`;
        });
        html += `</div>`;
    });
    container.innerHTML = html;
}

function showModal(content, title = "INVOICE", showAction = true, actionFn = null) {
    document.getElementById('invTitle').innerText = title;
    document.getElementById('invDate').innerText = new Date().toLocaleString('id-ID');
    document.getElementById('invBody').innerHTML = content;
    
    const actionBtn = document.getElementById('invActionBtn');
    const cancelBtn = document.getElementById('invCancelBtn');
    
    if (showAction) {
        actionBtn.style.display = "block";
        cancelBtn.innerText = "BATAL";
        actionBtn.onclick = () => {
            actionBtn.innerHTML = "<i class='fas fa-spinner fa-spin'></i>";
            actionBtn.disabled = true;
            actionFn();
        };
    } else {
        actionBtn.style.display = "none";
        cancelBtn.innerText = "TUTUP";
    }
    document.getElementById('invoiceModal').style.display = "flex";
}

function closeModal() {
    document.getElementById('invoiceModal').style.display = "none";
    const actionBtn = document.getElementById('invActionBtn');
    actionBtn.innerHTML = "KONFIRMASI";
    actionBtn.disabled = false;
}

function prosesBeli(id, nama, harga) {
    if (!userID) {
        showModal("<p style='text-align:center'>Anda harus masuk ke akun terlebih dahulu.</p>", "AUTH REQUIRED", false);
        return;
    }

    if (userSaldo < harga) {
        showModal("<p style='text-align:center'>Saldo tidak mencukupi untuk transaksi ini.</p>", "SALDO KURANG", false);
        return;
    }

    const confirmHtml = `
        <div class="invoice-row"><span>Item</span> <span style="font-weight:700; color:#1e293b">${nama}</span></div>
        <div class="invoice-row"><span>Harga</span> <span>Rp ${harga.toLocaleString('id-ID')}</span></div>
        <div class="invoice-row" style="font-weight:800; border-top:1px solid #f1f5f9; padding-top:15px; margin-top:10px; color:#1e293b; font-size:16px;">
            <span>TOTAL</span> <span>Rp ${harga.toLocaleString('id-ID')}</span>
        </div>
    `;

    showModal(confirmHtml, "KONFIRMASI", true, () => {
        db.ref(`stok_voucher/${id}`).limitToFirst(1).once('value', (snapshot) => {
            if (!snapshot.exists()) {
                showModal("<p style='text-align:center'>Produk ini baru saja habis terjual.</p>", "STOK HABIS", false);
                return;
            }

            const key = Object.keys(snapshot.val())[0];
            const voucherSN = snapshot.val()[key];
            const tgl = new Date().toLocaleString('id-ID');

            const newSaldo = userSaldo - harga;
            db.ref(`users/${userID}/Saldo`).set(newSaldo).then(() => {
                db.ref(`stok_voucher/${id}/${key}`).remove();
                db.ref(`history/${userID}`).push({
                    produk: nama,
                    total: harga,
                    tanggal: tgl,
                    status: "Berhasil",
                    voucher: voucherSN,
                    invoice: "INV-" + Date.now()
                }).then(() => {
                    const successHtml = `
                        <div style="text-align:center">
                            <i class="fas fa-check-circle" style="color:#10b981; font-size:48px; margin-bottom:15px;"></i>
                            <p style="margin:0; font-weight:700; color:#1e293b;">Pembayaran Berhasil</p>
                            <div class="success-code">${voucherSN}</div>
                            <p style="font-size:11px; color:#94a3b8;">Simpan kode voucher ini untuk aktivasi layanan Anda.</p>
                        </div>
                    `;
                    showModal(successHtml, "BERHASIL", false);
                });
            });
        });
    });
}

renderProducts();
</script>
</body>
</html>
