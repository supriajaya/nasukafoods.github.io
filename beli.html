<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beli Voucher - Nasuka Foods</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://nasukafoods.site/index.css">
    <style>
        body { background-color: #f4f4f4; font-family: sans-serif; margin: 0; }
        .voucher-container { padding: 15px; padding-bottom: 80px; }
        .category-title { font-weight: bold; margin: 15px 0 10px; color: #333; border-left: 4px solid #ee4d2d; padding-left: 10px; }
        .voucher-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .voucher-card { background: white; border-radius: 10px; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; border: 1px solid #eee; }
        .voucher-card img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; }
        .v-name { font-size: 13px; font-weight: bold; display: block; height: 35px; overflow: hidden; }
        .v-price { color: #ee4d2d; font-weight: bold; font-size: 14px; margin: 5px 0; display: block; }
        .btn-beli { background: #ee4d2d; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; width: 100%; font-weight: bold; }
        
        .header-beli { background: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header-beli i { margin-right: 15px; font-size: 18px; cursor: pointer; }
        
        .user-balance-info { background: #fff8e1; padding: 15px; margin: 10px; border-radius: 8px; border: 1px solid #ffecb3; display: flex; justify-content: space-between; align-items: center; }

        /* --- MODAL INVOICE STYLE --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .invoice-box {
            background: #fff;
            width: 85%;
            max-width: 320px;
            padding: 25px;
            border-radius: 2px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            font-family: 'Courier New', Courier, monospace;
            color: #222;
            position: relative;
        }

        .invoice-header {
            text-align: center;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .invoice-header h2 { margin: 0; font-size: 18px; letter-spacing: 2px; font-weight: bold; }
        .invoice-header small { font-size: 10px; color: #666; display: block; margin-top: 5px; }

        .invoice-body { font-size: 13px; line-height: 1.6; }
        .invoice-row { display: flex; justify-content: space-between; margin-bottom: 6px; }

        .invoice-footer {
            border-top: 2px dashed #ccc;
            margin-top: 15px;
            padding-top: 15px;
            text-align: center;
        }

        .btn-invoice {
            background: #222;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-cancel {
            background: transparent;
            color: #999;
            border: none;
            margin-top: 12px;
            font-size: 11px;
            cursor: pointer;
            text-decoration: underline;
            width: 100%;
        }

        .success-code {
            background: #fdfdfd;
            border: 1px solid #eee;
            padding: 12px;
            margin: 10px 0;
            font-weight: bold;
            font-size: 18px;
            color: #000;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="header-beli">
    <i class="fas fa-arrow-left" onclick="history.back()"></i>
    <h3 style="margin:0;">Voucher Data & Hiburan</h3>
</div>

<div class="user-balance-info">
    <span>Saldo Anda:</span>
    <strong id="displaySaldo">Rp 0</strong>
</div>

<div class="voucher-container">
    <div id="voucher-list"></div>
</div>

<div id="invoiceModal" class="modal-overlay">
    <div class="invoice-box">
        <div class="invoice-header">
            <h2 id="invTitle">INVOICE</h2>
            <small id="invDate"></small>
        </div>
        <div class="invoice-body" id="invBody">
            </div>
        <div class="invoice-footer">
            <button class="btn-invoice" id="invActionBtn">KONFIRMASI</button>
            <button class="btn-cancel" id="invCancelBtn" onclick="closeModal()">TUTUP</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAJPoqA190LutHQ7xnvnV96GTRHzz24IpT",
    authDomain: "nasukafoods1.firebaseapp.com",
    databaseURL: "https://nasukafoods1-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "nasukafoods1",
    messagingSenderId: "84287800896",
    appId: "1:84287800896:web:83189d6766997b00f701a5"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();

const userID = localStorage.getItem("ID");
let userSaldo = 0;

const products = [
    { cat: "Voucher Data", items: [
        { id: "ax1", name: "Axis 5GB", price: 11000, img: "https://nasukafoods.site/image/axis.jpg" },
        { id: "is1", name: "Indosat 3GB", price: 15000, img: "https://nasukafoods.site/image/indosat.jpg" },
        { id: "sf1", name: "Smartfren 10GB", price: 15000, img: "https://nasukafoods.site/image/smartfren.jpg" },
        { id: "ts1", name: "Telkomsel 2GB", price: 28000, img: "https://nasukafoods.site/image/tsel.jpg" }
    ]},
    { cat: "Voucher Wifi", items: [
        { id: "wf1", name: "Wifi Id", price: 45000, img: "https://nasukafoods.site/image/wifiid.png" },
        { id: "nc1", name: "Nita Cell", price: 2000, img: "https://nasukafoods.site/image/nitacell.jpg" }
    ]},
    { cat: "Voucher Hiburan", items: [
        { id: "nf1", name: "Netflix 1 Day", price: 60000, img: "https://nasukafoods.site/image/netflix.png" },
        { id: "gp1", name: "Google Play 20K", price: 25000, img: "https://nasukafoods.site/image/gplay.png" }
    ]}
];

function renderProducts() {
    const container = document.getElementById('voucher-list');
    let html = '';
    products.forEach(group => {
        html += `<div class="category-title">${group.cat}</div><div class="voucher-grid">`;
        group.items.forEach(p => {
            html += `
                <div class="voucher-card">
                    <img src="${p.img}" alt="logo">
                    <span class="v-name">${p.name}</span>
                    <span class="v-price">Rp ${p.price.toLocaleString('id-ID')}</span>
                    <button class="btn-beli" onclick="prosesBeli('${p.id}', '${p.name}', ${p.price})">Beli</button>
                </div>`;
        });
        html += `</div>`;
    });
    container.innerHTML = html;
}

// Fungsi Modal Kustom
function showModal(content, title = "INVOICE", showAction = true, actionFn = null) {
    document.getElementById('invTitle').innerText = title;
    document.getElementById('invDate').innerText = new Date().toLocaleString('id-ID');
    document.getElementById('invBody').innerHTML = content;
    
    const actionBtn = document.getElementById('invActionBtn');
    if (showAction) {
        actionBtn.style.display = "block";
        actionBtn.onclick = () => {
            actionBtn.innerHTML = "MEMPROSES...";
            actionBtn.disabled = true;
            actionFn();
        };
    } else {
        actionBtn.style.display = "none";
    }
    
    document.getElementById('invoiceModal').style.display = "flex";
}

function closeModal() {
    document.getElementById('invoiceModal').style.display = "none";
    // Reset button state
    const actionBtn = document.getElementById('invActionBtn');
    actionBtn.innerHTML = "KONFIRMASI";
    actionBtn.disabled = false;
}

function prosesBeli(id, nama, harga) {
    if (!userID) {
        showModal("<p style='text-align:center'>Silahkan login untuk bertransaksi.</p>", "AUTH REQUIRED", false);
        return;
    }

    if (userSaldo < harga) {
        showModal("<p style='text-align:center'>Saldo Anda tidak mencukupi.</p>", "SALDO KURANG", false);
        return;
    }

    const confirmHtml = `
        <div class="invoice-row"><span>PRODUK</span> <span>${nama}</span></div>
        <div class="invoice-row"><span>HARGA</span> <span>Rp ${harga.toLocaleString('id-ID')}</span></div>
        <div class="invoice-row" style="font-weight:bold; margin-top:10px; border-top:1px solid #eee; padding-top:5px;">
            <span>TOTAL</span> <span>Rp ${harga.toLocaleString('id-ID')}</span>
        </div>
    `;

    showModal(confirmHtml, "CONFIRMATION", true, () => {
        db.ref(`stok_voucher/${id}`).limitToFirst(1).once('value', (snapshot) => {
            if (!snapshot.exists()) {
                showModal("<p style='text-align:center'>Maaf, stok baru saja habis.</p>", "OUT OF STOCK", false);
                return;
            }

            const key = Object.keys(snapshot.val())[0];
            const voucherSN = snapshot.val()[key];
            const tgl = new Date().toLocaleString('id-ID');

            const newSaldo = userSaldo - harga;
            db.ref(`users/${userID}/Saldo`).set(newSaldo).then(() => {
                db.ref(`stok_voucher/${id}/${key}`).remove();
                db.ref(`history/${userID}`).push({
                    produk: nama,
                    total: harga,
                    tanggal: tgl,
                    status: "Berhasil",
                    voucher: voucherSN
                }).then(() => {
                    const successHtml = `
                        <p style="text-align:center; margin-bottom:5px;">TRANSAKSI BERHASIL</p>
                        <div class="success-code">${voucherSN}</div>
                        <p style="font-size:9px; text-align:center; color:#777; line-height:1.2;">Terima kasih telah memilih Nasuka Foods. Kode di atas adalah voucher Anda.</p>
                    `;
                    showModal(successHtml, "OFFICIAL RECEIPT", false);
                });
            });
        });
    });
}

if (userID) {
    db.ref(`users/${userID}/Saldo`).on('value', (snap) => {
        userSaldo = snap.val() || 0;
        document.getElementById('displaySaldo').textContent = 'Rp ' + userSaldo.toLocaleString('id-ID');
    });
}

renderProducts();
</script>
</body>
</html>
